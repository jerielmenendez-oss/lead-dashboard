        .header h1 span { color: #3b82f6; }
        .header .subtitle { font-size: 13px; color: #888; margin-top: 4px; }

        .stat { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 12px 16px; min-width: 120px; }
        .stat .number { font-size: 24px; font-weight: 800; color: #fff; }
        .stat .label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
        .stat.fire .number { color: #ef4444; }
        .stat.hot .number { color: #f97316; }
        .stat.warm .number { color: #eab308; }

        .filters { padding: 12px 24px; display: flex; gap: 8px; flex-wrap: wrap; background: #0f0f0f; border-bottom: 1px solid #1a1a1a; }
        .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #333; background: transparent; color: #aaa; font-size: 12px; cursor: pointer; font-family: inherit; }
        .filter-btn:hover { border-color: #555; color: #fff; }
        .filter-btn.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }

        .search-bar { padding: 12px 24px; background: #0f0f0f; }
        .search-bar input { width: 100%; padding: 10px 16px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 14px; font-family: inherit; outline: none; }
        .search-bar input:focus { border-color: #3b82f6; }

        .table-container { padding: 0 24px 24px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 13px; }
        thead th { background: #1a1a1a; padding: 10px 12px; text-align: left; font-weight: 600; color: #888; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; position: sticky; top: 0; border-bottom: 2px solid #333; white-space: nowrap; }
        tbody tr { border-bottom: 1px solid #1a1a1a; transition: background 0.15s; }
        tbody tr:hover { background: #151515; }
        tbody td { padding: 12px; vertical-align: top; }

        .score-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-weight: 700; font-size: 12px; }
        .score-fire { background: #ef444420; color: #ef4444; }
        .score-hot { background: #f9731620; color: #f97316; }
        .score-warm { background: #eab30820; color: #eab308; }
        .score-cool { background: #3b82f620; color: #3b82f6; }
        .score-skip { background: #33333340; color: #666; }

        .tier-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .tier-fire { background: #ef4444; color: #fff; }
        .tier-hot { background: #f97316; color: #fff; }
        .tier-warm { background: #eab308; color: #000; }
        .tier-cool { background: #3b82f6; color: #fff; }

        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
        .status-done { background: #22c55e; }
        .status-pending { background: #666; }
        .status-live { background: #3b82f6; }

        .link { color: #3b82f6; text-decoration: none; }
        .link:hover { text-decoration: underline; }

        .problems { font-size: 11px; color: #999; max-width: 250px; }
        .problems li { margin-bottom: 2px; }

        .phone-link { color: #22c55e; text-decoration: none; font-weight: 600; }
        .address-link { color: #eab308; text-decoration: none; font-size: 12px; }
        .address-link:hover { text-decoration: underline; }

        .business-name { font-weight: 700; color: #fff; font-size: 14px; }
        .business-type { font-size: 11px; color: #888; margin-top: 2px; }

        .no-website { color: #ef4444; font-weight: 600; font-size: 11px; }

        .actions { display: flex; gap: 6px; flex-wrap: wrap; }
        .action-btn { padding: 4px 10px; border-radius: 6px; font-size: 11px; text-decoration: none; font-weight: 600; border: 1px solid; }
        .action-demo { background: #3b82f620; color: #3b82f6; border-color: #3b82f640; }
        .action-audit { background: #8b5cf620; color: #8b5cf6; border-color: #8b5cf640; }
        .action-call { background: #22c55e20; color: #22c55e; border-color: #22c55e40; }
        .action-map { background: #eab30820; color: #eab308; border-color: #eab30840; }

        .last-updated { text-align: center; padding: 20px; color: #555; font-size: 12px; }

        @media (max-width: 768px) {
            .stats-bar { gap: 8px; }
            .stat { min-width: 80px; padding: 8px 12px; }
            .stat .number { font-size: 18px; }
            table { font-size: 12px; }
            .header { padding: 16px; }
            .table-container { padding: 0 8px 16px; }
        }
    </style>

    // Sort by score descending
    LEADS.sort((a, b) => b.score - a.score);

    function getTierClass(score) {
        if (score >= 80) return 'fire';
        if (score >= 60) return 'hot';
        if (score >= 40) return 'warm';
        if (score >= 20) return 'cool';
        return 'skip';
    }

    function renderLeads(leads) {
        const tbody = document.getElementById('leads-table');
        tbody.innerHTML = leads.map((lead, i) => {
            const tier = getTierClass(lead.score);
            const websiteCell = lead.website
                ? `<a href="${lead.website}" target="_blank" class="link" style="font-size:12px;word-break:break-all;">${new URL(lead.website).hostname}</a>`
                : '<span class="no-website">NO WEBSITE</span>';

            const problemsList = lead.problems.map(p => `<li>${p}</li>`).join('');

            const auditCell = lead.hasAudit
                ? `<span class="status-dot status-done"></span>Done (${lead.auditScore}/100)`
                : '<span class="status-dot status-pending"></span>Pending';

            const demoCell = lead.hasDemo
                ? `<a href="${lead.demoUrl}" target="_blank" class="link"><span class="status-dot status-live"></span>Live</a>`
                : '<span class="status-dot status-pending"></span>Pending';

            const actions = [];
            if (lead.phone && lead.phone !== 'Unknown') actions.push(`<a href="tel:${lead.phone.replace(/[^0-9]/g,'')}" class="action-btn action-call">Call</a>`);
            if (lead.address && lead.address !== 'Unknown') actions.push(`<a href="https://www.google.com/maps/dir//${encodeURIComponent(lead.address)}" target="_blank" class="action-btn action-map">Map</a>`);
            if (lead.demoUrl) actions.push(`<a href="${lead.demoUrl}" target="_blank" class="action-btn action-demo">Demo</a>`);
            if (lead.hasAudit) actions.push(`<a href="${lead.auditUrl}" class="action-btn action-audit">Audit</a>`);

            return `<tr data-tier="${tier}" data-has-demo="${lead.hasDemo}" data-has-audit="${lead.hasAudit}" data-has-website="${!!lead.website}">
                <td style="color:#555;">${i + 1}</td>
                <td>
                    <div class="business-name">${lead.name}</div>
                    <div class="business-type">${lead.type} — ${lead.city}</div>
                    ${lead.owner && lead.owner !== 'Unknown' ? `<div style="font-size:11px;color:#666;margin-top:2px;">Owner: ${lead.owner}</div>` : ''}
                </td>
                <td>
                    ${lead.phone && lead.phone !== 'Unknown' ? `<a href="tel:${lead.phone.replace(/[^0-9]/g,'')}" class="phone-link">${lead.phone}</a><br>` : ''}
                    ${lead.address ? `<a href="https://www.google.com/maps/dir//${encodeURIComponent(lead.address)}" target="_blank" class="address-link">${lead.address}</a>` : ''}
                </td>
                <td><span class="score-badge score-${tier}">${lead.score}</span><br><span class="tier-badge tier-${tier}">${tier}</span></td>
                <td>${websiteCell}</td>
                <td><ul class="problems">${problemsList}</ul></td>
                <td>${auditCell}</td>
                <td>${demoCell}</td>
                <td><div class="actions">${actions.join('')}</div></td>
            </tr>`;
        }).join('');

        // Update stats
        document.getElementById('stat-total').textContent = leads.length;
        document.getElementById('stat-fire').textContent = leads.filter(l => l.score >= 80).length;
        document.getElementById('stat-hot').textContent = leads.filter(l => l.score >= 60 && l.score < 80).length;
        document.getElementById('stat-warm').textContent = leads.filter(l => l.score >= 40 && l.score < 60).length;
        document.getElementById('stat-audited').textContent = leads.filter(l => l.hasAudit).length;
        document.getElementById('stat-demos').textContent = leads.filter(l => l.hasDemo).length;
    }

    function filterLeads(filter) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');

        let filtered = LEADS;
        if (filter === 'fire') filtered = LEADS.filter(l => l.score >= 80);
        if (filter === 'hot') filtered = LEADS.filter(l => l.score >= 60 && l.score < 80);
        if (filter === 'warm') filtered = LEADS.filter(l => l.score >= 40 && l.score < 60);
        if (filter === 'no-website') filtered = LEADS.filter(l => !l.website);
        if (filter === 'has-demo') filtered = LEADS.filter(l => l.hasDemo);
        if (filter === 'has-audit') filtered = LEADS.filter(l => l.hasAudit);

        renderLeads(filtered);
    }

    function searchLeads(query) {
        if (!query) { renderLeads(LEADS); return; }
        const q = query.toLowerCase();
        const filtered = LEADS.filter(l =>
            l.name.toLowerCase().includes(q) ||
            l.city.toLowerCase().includes(q) ||
            l.type.toLowerCase().includes(q) ||
            (l.owner && l.owner.toLowerCase().includes(q))
        );
        renderLeads(filtered);
    }

    // Initial render
    renderLeads(LEADS);
    document.getElementById('last-updated').textContent = `Last updated: ${new Date().toLocaleString()} — Data from AI pipeline agents`;
    </script>
